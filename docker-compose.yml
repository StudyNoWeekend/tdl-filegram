# tdl-filegram Docker Compose
# 使用方法：
#   1. 按需修改下方 environment / volumes
#   2. docker compose up -d --build
services:
  tdl-filegram:
    build: .
    image: tdl-filegram:latest
    container_name: tdl-filegram
    restart: unless-stopped
    ports:
      - "8744:8744"                   # 前端端口（nginx）
      - "8743:8743"                   # 后端端口（Go API）
    environment:
      # ── SQLite 数据库路径（挂载到宿主机持久化）──
      DB_PATH: /data/tdl-filegram.db
      # ── 下载配置 ──
      DOWNLOAD_DIR: /downloads        # 下载内容输出目录
      DOWNLOAD_THREADS: "4"           # 单文件下载线程数
      DOWNLOAD_LIMIT: "2"             # 最大并发任务数
      # ── Telegram 凭证 ──
      TG_APP_ID: ""               # 建议替换为自己的 api_id
      TG_APP_HASH: ""
      # ── 会话 / 连接 ──
      TG_DATA_DIR: /data/.tdl         # BoltDB session 存储目录
      TG_NAMESPACE: default           # session 命名空间
      TG_POOL_SIZE: "8"               # DC 连接池大小
      TG_RECONNECT_TIMEOUT: 5m        # 重连退避超时
      TG_PROXY: ""                    # 代理地址，如 http://127.0.0.1:7890
    volumes:
      - ./data:/data                  # SQLite + session 持久化
      - ./downloads:/downloads        # 下载内容输出
